name: Weekend Trade Bot
on:
  schedule:
    # 1回目：日本時間 12:00 (UTC 03:00)
    - cron: '0 3 * * 5'
    # 2回目：日本時間 14:50 (UTC 05:50)
    - cron: '50 5 * * 5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install yfinance requests
      - name: Run script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python main.py
